namespace = fuzzel
font = JetBrains Mono:size=13
placeholder=Search...
match-mode=fuzzy
match-counter=yes
lines=15
width=50
horizontal-pad=40
vertical-pad=28
dpi-aware=no

[colors]
background=11111177
text=ddddeeff
prompt=ddddeeff
placeholder=ffffff55
input=ddddeeff
match=5498ffff
selection=ffffff22
selection-text=ddddeeff
selection-match=5498ffff
counter=ddddeeff
border=5498ffff

[border]
width=2
radius=25
selection-radius=10

[key-bindings]
cancel=Escape
execute=Return KP_Enter
cursor-home=Home
cursor-end=End
delete-line=Control+a
